    </linearGradient>
    <linearGradient id="windowGloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="buttonFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bdb2a0"/>
      <stop offset="0.55" stop-color="#938770"/>
      <stop offset="1" stop-color="#695f52"/>
    </linearGradient>
    <radialGradient id="playGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 1190) rotate(90) scale(116 116)">
