      <stop offset="0.45" stop-color="#ffb752" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff9b2d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ledGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 1048) rotate(90) scale(28 28)">
      <stop offset="0" stop-color="#cfff8b"/>
      <stop offset="1" stop-color="#75c938" stop-opacity="0"/>
    </radialGradient>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
