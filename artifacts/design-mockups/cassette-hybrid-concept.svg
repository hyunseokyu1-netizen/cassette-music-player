<svg width="720" height="1480" viewBox="0 0 720 1480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneBody" x1="88" y1="28" x2="632" y2="1452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c8c0b0"/>
      <stop offset="0.35" stop-color="#8d867d"/>
      <stop offset="1" stop-color="#59534c"/>
    </linearGradient>
    <linearGradient id="screenFrame" x1="116" y1="138" x2="604" y2="1296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c4945"/>
