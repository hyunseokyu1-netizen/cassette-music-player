kind = "mobile"
previewPath = "/"
title = "Cassette Tape Music Player"
version = "1.0.0"
id = "artifacts/cassette-player"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25785

[services.development]
run = "pnpm --filter @workspace/cassette-player run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cassette-player", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cassette-player", "run", "serve" ]

[services.env]
PORT = "25785"
BASE_PATH = "/"
